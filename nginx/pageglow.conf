# Upstream для Django приложения
upstream pageglow_app {
    server pageglow:8000;
}

# HTTP блок с редиректом на HTTPS (для production)
server {
    listen 80;
    server_name pageglow.ru www.pageglow.ru localhost;
    charset utf-8;
    client_max_body_size 75M;

    # Логирование
    access_log /var/log/nginx/pageglow_access.log;
    error_log /var/log/nginx/pageglow_error.log warn;

    # Для развертывания с letsencrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Редирект на HTTPS (включить в production)
    # return 301 https://$server_name$request_uri;

    # Статика
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Медиа файлы
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Favicon и robots.txt
    location = /favicon.ico {
        alias /app/staticfiles/images/favicon.ico;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        alias /app/staticfiles/robots.txt;
        access_log off;
        log_not_found off;
    }

    # Проксирование на Django
    location / {
        proxy_pass http://pageglow_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # WebSocket support (если нужно)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Защита от доступа к служебным файлам
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

