server {
    listen 8088;
    charset     utf8;

    access_log /app/www/pageglow/logs/pageglow_access.log;
    error_log /app/www/pageglow/logs/pageglow_error.log error;

        location / {
            proxy_pass http://pageglow:8000;
            proxy_set_header X-Url-Sheme $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
            proxy_redirect off;
        }

        location /favicon.ico { access_log off; log_not_found off; }
        location /static/ { root /app/www/pageglow; }
        location /media/ {root /app/www/pageglow; }
}