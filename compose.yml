services:
  nginx:
    image: nginx:latest
    container_name: nginx-server
    restart: always
    networks:
      - dbnet
    expose:
      - 8088
    ports:
      - "80:8088"
    volumes:
      - ./PageGlow/static:/app/www/PageGlow/static
      - ./PageGlow/media:/app/www/PageGlow/media
      - ./PageGlow/logs:/app/www/PageGlow/logs
      - ./nginx:/etc/nginx/conf.d
    depends_on:
      - pageglow
  pageglow:
    build: ./PageGlow
    image: pageglow
    container_name: pageglow
    restart: always
    command: "gunicorn -c gunicorn.py PageGlow.wsgi"
    env_file:
      - .env
    links:
      - "postgres:dbps"
    networks:
      - dbnet
    volumes:
      - ./PageGlow:/app/www/PageGlow
    ports:
      - "8000:8000"
    depends_on:
      - postgres
  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "8080:8080"
    links:
      - "postgres:db"
    networks:
      - dbnet
    depends_on:
      - postgres
  postgres:
    image: postgres:17-alpine
    container_name: pageglow-postgres
    volumes:
      - postgres-data:/var/lib/postgres/data
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USERNAME}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    networks:
      - dbnet

networks:
  dbnet:
    driver: bridge

volumes:
  postgres-data:
